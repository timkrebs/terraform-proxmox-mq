version: 2
updates:

  # GitHub actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore: "
    labels:
      - "release/patch"

  # Terraform
  - package-ecosystem: "terraform"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore: "
    labels:
      - "release/patch"

  - package-ecosystem: "terraform"
    directory: "/examples/basic/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore: "
    labels:
      - "release/patch"
